name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thinkgrid-pwa/package-lock.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: thinkgrid-pwa
        run: npm ci

      - name: Build web app
        working-directory: thinkgrid-pwa
        run: npm run build

      - name: Sync Capacitor
        working-directory: thinkgrid-pwa
        run: npx cap sync android

      - name: Build APK
        working-directory: thinkgrid-pwa/android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinkgrid-release-apk
          path: thinkgrid-pwa/android/app/build/outputs/apk/release/app-release-unsigned.apk
